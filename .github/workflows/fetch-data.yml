name: 🔄 Fetch CenProject Data (Playwright)

on:
  schedule:
    - cron: '0 23 * * *'   # 06:00 ICT ทุกวัน
  workflow_dispatch:
    inputs:
      budget_year:
        description: 'ปีงบประมาณ (2026)'
        required: false
        default: '2026'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies
        run: pip install playwright

      - name: 🌐 Install Chromium browser
        run: python -m playwright install chromium --with-deps

      - name: 🔐 Fetch data from CenProject
        env:
          CENPROJECT_USER: ${{ secrets.CENPROJECT_USER }}
          CENPROJECT_PASS: ${{ secrets.CENPROJECT_PASS }}
          BUDGET_YEAR: ${{ github.event.inputs.budget_year || '2026' }}
          CI: "true"
        run: python scripts/fetch_cenproject.py

      - name: 🐛 Upload debug screenshots (ถ้าล้มเหลว)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: data/debug_*.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 💾 Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "ℹ️ ไม่มีการเปลี่ยนแปลง"
          else
            git commit -m "🔄 Auto-update $(date +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Push สำเร็จ"
          fi

      - name: 📊 Summary
        if: always()
        run: |
          echo "### ผลการรัน" >> $GITHUB_STEP_SUMMARY
          if [ -f data/meta.json ]; then
            echo "✅ **สำเร็จ**" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/meta.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **ล้มเหลว** — ดู Artifacts → debug-screenshots" >> $GITHUB_STEP_SUMMARY
          fi

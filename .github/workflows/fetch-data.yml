name: 🔄 Fetch CenProject Data

on:
  # รันอัตโนมัติทุกวัน เวลา 06:00 น. (ไทย = UTC+7 → 23:00 UTC วันก่อน)
  schedule:
    - cron: '0 23 * * *'

  # กดปุ่มรันเองได้จาก GitHub Actions tab
  workflow_dispatch:
    inputs:
      budget_year:
        description: 'ปีงบประมาณ (เช่น 2026)'
        required: false
        default: '2026'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout repo
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: pip install requests urllib3

      # 4. Run fetch script
      - name: 🔐 Fetch data from CenProject
        env:
          CENPROJECT_USER: ${{ secrets.CENPROJECT_USER }}
          CENPROJECT_PASS: ${{ secrets.CENPROJECT_PASS }}
          BUDGET_YEAR: ${{ github.event.inputs.budget_year || '2026' }}
        run: python scripts/fetch_cenproject.py

      # 5. Commit & push ไฟล์ xlsx ที่ได้
      - name: 💾 Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔄 Auto-update CenProject data $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: false

      # 6. แสดงผลสรุป
      - name: ✅ Summary
        run: |
          echo "### ✅ อัปเดตข้อมูลสำเร็จ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/meta.json ]; then
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat data/meta.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
